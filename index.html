<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Keybinds & Accessibility Demo</title>
        <link rel="stylesheet" href="style.css" type="text/css">
    </head>
    <body>
        <main>
            <h1>Keybinds and Accessibility Demo</h1>
            <section class="info">
                <header>
                    <h2>SYSTEM STATE</h2>
                </header>
                <p class="active-keys" id="activeKeys">active keys: {A, Shift, Ctrl}</p>
                <p class="last-key" id="lastKey">last key pressed: Ctrl</p>
                <p class="editing-state" id="editingState">currently editing: FALSE</p>
                <p class="typing-state" id="typingState">currently typing: FALSE</p>
                <p class="current-focus" id="current-focus">current focus: WINDOW</p>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
