<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Keybinds & Accessibility Demo</title>
        <link rel="stylesheet" href="style.css" type="text/css">
    </head>
    <body>
        <main>
            <h1>Keybinds and Accessibility Demo</h1>
            <div class="flex-wrapper">
                <section class="info">
                    <header>
                        <h2>System State</h2>
                    </header>
                    <p>active keys: <span id="activeKeys">NONE</span></p>
                    <p>last key pressed: <span id="lastKey">NONE</span></p>
                    <br>
                    <p>currently editing: <span id="editingState">false</span></p>
                    <p>currently typing: <span id="typingState">false</span></p>
                    <br>
                    <p>current focus: <span id="currentFocus">window</span></p>
                </section>
                <section class="features">
                    <header>
                        <h2>Inputs and buttons</h2>
                    </header>
                    <div class="row">
                        <div class="col">
                            <label for="input">Text Input</label>
                            <input type="text" id="input" name="q">
                        </div>
                        <button class="dark-mode" id="darkModeBtn">Dark mode</button>
                    </div>
                </section>
                <section class="toggles">

                </section>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
