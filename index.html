<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Keybinds & Accessibility Demo</title>
        <link rel="stylesheet" href="style.css" type="text/css">
    </head>
    <body>
        <main>
            <h1>Keybinds and Accessibility Demo</h1>
            <div class="flex-wrapper">
                <section class="info">
                    <header>
                        <h2>SYSTEM STATE</h2>
                    </header>
                    <p id="activeKeys">active keys: {A, Shift, Ctrl}</p>
                    <p id="lastKey">last key pressed: Ctrl</p>
                    <br>
                    <p id="editingState">currently editing: FALSE</p>
                    <p id="typingState">currently typing: FALSE</p>
                    <br>
                    <p id="current-focus">current focus: WINDOW</p>
                </section>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
